```yaml
name: 🎬 Render Cinematic Intro

on:
  workflow_dispatch:
    inputs:

      resolution:
        description: "📐 Output Resolution"
        required: true
        default: "1080"
        type: choice
        options:
          - "1080"
          - "4K"

      asset_source:
        description: "📁 Asset Source"
        required: true
        default: "repo_assets"
        type: choice
        options:
          - "repo_assets"
          - "external_urls"

      image_url:
        description: "🖼️ Image URL"
        required: false
        default: ""
        type: string

      music_url:
        description: "🎵 Music URL"
        required: false
        default: ""
        type: string

      effects_preset:
        description: "🎨 Effects Preset"
        required: true
        default: "cinematic"
        type: choice
        options:
          - "cinematic"
          - "fire"
          - "noir"
          - "glitch"
          - "smoke_heavy"
          - "ultra"

      shake_intensity:
        description: "📳 Shake Intensity"
        required: false
        default: "1"
        type: choice
        options:
          - "0"
          - "1"
          - "2"
          - "3"

      color_grade:
        description: "🎨 Color Grade"
        required: false
        default: "golden"
        type: choice
        options:
          - "golden"
          - "cold"
          - "noir"
          - "red_heat"
          - "none"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: 📥 Checkout
        uses: actions/checkout@v4.2.2

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: 📦 Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg libsndfile1 libsndfile1-dev

      - name: 📦 Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: 📁 Create folders
        run: |
          mkdir -p assets
          mkdir -p output
          mkdir -p src

      # =========================
      # Repo Assets
      # =========================
      - name: 🖼️ Use repo assets
        if: ${{ github.event.inputs.asset_source == 'repo_assets' }}
        run: |

          if [ ! -f assets/storyboard.jpg ]; then
            echo "Creating placeholder image..."

            python <<EOF
from PIL import Image, ImageDraw

img = Image.new("RGB", (1920,1080), color=(15,15,20))
draw = ImageDraw.Draw(img)

draw.text((760,500), "HOGAN VAPE", fill=(255,180,0))
draw.text((760,560), "CINEMATIC INTRO", fill=(180,180,180))

img.save("assets/storyboard.jpg", quality=95)
print("Placeholder created")
EOF

          else
            echo "Found storyboard image"
          fi

          if ls assets/music.* 1> /dev/null 2>&1; then
            echo "Audio file found"
          else
            echo "No audio found"
          fi

      # =========================
      # External Assets
      # =========================
      - name: 🌐 Download external assets
        if: ${{ github.event.inputs.asset_source == 'external_urls' }}
        run: |

          IMAGE_URL="${{ github.event.inputs.image_url }}"
          MUSIC_URL="${{ github.event.inputs.music_url }}"

          if [ -n "$IMAGE_URL" ]; then

            echo "Downloading image..."
            curl -L "$IMAGE_URL" -o assets/storyboard.jpg

          else

            echo "No image URL provided"

            python <<EOF
from PIL import Image

img = Image.new("RGB", (1920,1080), color=(20,20,20))
img.save("assets/storyboard.jpg")
EOF

          fi

          if [ -n "$MUSIC_URL" ]; then

            echo "Downloading music..."

            EXT="${MUSIC_URL##*.}"
            EXT="${EXT%%\?*}"

            case "$EXT" in
              mp3|wav|aac|ogg|flac)
                ;;
              *)
                EXT="mp3"
                ;;
            esac

            AUDIO_FILE="assets/music.$EXT"

            curl -L "$MUSIC_URL" -o "$AUDIO_FILE"

            ffmpeg -y \
              -i "$AUDIO_FILE" \
              -ar 44100 \
              -ac 2 \
              assets/music.wav

          else

            echo "No music URL provided"

          fi

      # =========================
      # Fix Audio
      # =========================
      - name: 🔧 Fix audio encoding
        run: |

          for f in assets/music.mp3 assets/music.aac assets/music.ogg assets/music.flac
          do
            if [ -f "$f" ]; then

              echo "Converting $f"

              ffmpeg -y \
                -i "$f" \
                -ar 44100 \
                -ac 2 \
                -sample_fmt s16 \
                assets/music_final.wav

              break
            fi
          done

          if [ -f assets/music.wav ] && [ ! -f assets/music_final.wav ]; then

            ffmpeg -y \
              -i assets/music.wav \
              -ar 44100 \
              -ac 2 \
              -sample_fmt s16 \
              assets/music_final.wav

          fi

      # =========================
      # Render
      # =========================
      - name: 🎬 Render video
        env:
          CI: "true"
          RESOLUTION: ${{ github.event.inputs.resolution }}
          EFFECTS_PRESET: ${{ github.event.inputs.effects_preset }}
          SHAKE_INTENSITY: ${{ github.event.inputs.shake_intensity }}
          COLOR_GRADE: ${{ github.event.inputs.color_grade }}
        run: |
          python main.py

      # =========================
      # Upload
      # =========================
      - name: 📤 Upload artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: intro-${{ github.event.inputs.resolution }}-${{ github.event.inputs.effects_preset }}-${{ github.run_number }}
          path: output/
          retention-days: 7

      # =========================
      # Summary
      # =========================
      - name: ✅ Summary
        run: |

          echo "====================================="
          echo "RENDER COMPLETE"
          echo "Resolution : ${{ github.event.inputs.resolution }}"
          echo "Preset     : ${{ github.event.inputs.effects_preset }}"
          echo "Grade      : ${{ github.event.inputs.color_grade }}"
          echo "Source     : ${{ github.event.inputs.asset_source }}"
          echo "====================================="

          ls -lh output/ || echo "output empty"
```
